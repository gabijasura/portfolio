  <title>Gabija Sura — Motion Designer</title>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
  <style>
    .reveal { opacity:0; transform:translateY(28px); transition: opacity .7s ease, transform .7s ease; }
    .playing-card .vid-controls { display: none; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* ── Chromatic aberration RGB split ── */
    .hero-title { position: relative; display: block; }
    .hero-title span {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      display: block;
    }
    .title-main {
      position: relative !important;
      color: white;
    }
    .title-r {
      color: rgba(255, 50, 100, 0.7);
      transform: translate(-3px, 0);
      mix-blend-mode: screen;
      transition: transform 0.15s ease;
    }
    .title-b {
      color: rgba(0, 220, 255, 0.7);
      transform: translate(3px, 0);
      mix-blend-mode: screen;
      transition: transform 0.15s ease;
    }
    .hero-title:hover .title-r { transform: translate(-10px, -2px); }
    .hero-title:hover .title-b { transform: translate(10px, 2px); }
  </style>
</head>
<body>

  <!-- SVG torn-edge filter for playing cards -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="torn-edge" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <canvas class="cursor-canvas"></canvas>

  <!-- ── NAV ── -->
  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>

      <li><a href="about.html">About</a></li>

  </nav>

  <!-- ══════════════════════
       HERO  (220vh tall — gives scroll room for the card animation)
       .hero-pin sticks the viewport so everything stays on screen
       while the user scrolls through all 220vh.
  ══════════════════════ -->
  <section class="hero" id="hero">
    <div class="hero-pin">

      <!-- 8-ball -->
      <div class="hero-float float-8ball">

      </div>

      <!-- Dice 1 — left, upper -->

      </div>

      <!-- Dice 2 — left, lower -->
      <div class="hero-float float-dice-2">
        <img src="assets/dice-pink2.png" alt="" />
      </div>

      <!-- Black cat — left edge, partially peeking -->
      <div class="hero-float float-cat">
        <img src="assets/fenyx.gif" alt="" />
      </div>

      <!-- Playing cards fan — bottom-right, GSAP-animated -->
      <div class="hero-cards" id="hero-cards">

        <a href="ball.html" class="playing-card card-1">
          <video src="videos/TheBall.mp4" autoplay muted loop playsinline></video>
          <img class="card-face" src="assets/card-clubs-new.webp" alt="" />
        </a>

        <a href="mushroom.html" class="playing-card card-2">
          <video src="videos/Mushroom.mp4" autoplay muted loop playsinline></video>
          <img class="card-face" src="assets/card-spades-new.webp" alt="" />
        </a>

        <a href="coral.html" class="playing-card card-3">
          <video src="videos/Coral.mp4" autoplay muted loop playsinline></video>
          <img class="card-face" src="assets/card-diamonds-new.webp" alt="" />
        </a>

        <a href="nightfall.html" class="playing-card card-4">
          <video src="videos/footprint.mp4" autoplay muted loop playsinline></video>
          <img class="card-face" src="assets/card-hearts-new.webp" alt="" />
        </a>

      </div><!-- /hero-cards -->

      <h1 class="hero-title">Gabija Sura</h1>

    </div><!-- /hero-pin -->
  </section>

  <!-- ══════════════════════════════
       SLOT MACHINE SECTION
  ══════════════════════════════ -->
  <section class="slot-section">

    <!-- Decorative stars — left -->
    <div class="slot-stars">
      <img src="assets/star-big.webp" class="slot-star-big" alt="" />
      <img src="assets/star-small.webp" class="slot-star-small" alt="" />
    </div>

    <!-- Cherry — top-right -->
    <div class="slot-cherry">
      <img src="assets/cherry.webp" class="cherry-img" alt="" />
    </div>

    <!-- Title pill -->
    <div class="slot-title-pill">
      <h2>Spin to explore</h2>
    </div>

    <!-- The machine -->
    <div class="slot-machine">
      <div class="slot-reels">

        <div class="slot-reel">
          <div class="slot-reel-inner"><img src="assets/duck.gif" alt="" /></div>
          <a href="duck.html" class="slot-reel-link"><span></span></a>
        </div>

        <div class="slot-reel">
          <div class="slot-reel-inner"><img src="assets/frog.gif" alt="" /></div>
          <a href="frog.html" class="slot-reel-link"><span></span></a>
        </div>

        <div class="slot-reel">
          <div class="slot-reel-inner"><img src="GIF/Flame.gif" alt="" /></div>
          <a href="fenyx.html" class="slot-reel-link"><span></span></a>
        </div>

      </div>

      <button class="slot-lever" aria-label="Spin the reels">
        <div class="lever-ball"></div>

    <p class="slot-subtitle">Pull the lever</p>

  <footer>
    <span>Gabija Sura | <a href="mailto:gabijasura@gmail.com">gabijasura@gmail.com</a> | 2025</span>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Chromatic aberration RGB split on hero title
    const title = document.querySelector('.hero-title');
    const text = title.textContent;

    title.innerHTML = `
      <span class="title-r" aria-hidden="true">${text}</span>
      <span class="title-main">${text}</span>
      <span class="title-b" aria-hidden="true">${text}</span>
    `;

    title.addEventListener('mousemove', e => {
      const rect = title.getBoundingClientRect();
      const x = (e.clientX - rect.left) / rect.width - 0.5;
      const y = (e.clientY - rect.top) / rect.height - 0.5;

      gsap.to('.title-r', { x: x * -24, y: y * -8, duration: 0.2, ease: 'power2.out' });
      gsap.to('.title-b', { x: x * 24,  y: y * 8,  duration: 0.2, ease: 'power2.out' });
    });

    title.addEventListener('mouseleave', () => {
      gsap.to('.title-r', { x: -3, y: 0, duration: 0.6, ease: 'elastic.out(1, 0.4)' });
      gsap.to('.title-b', { x: 3,  y: 0, duration: 0.6, ease: 'elastic.out(1, 0.4)' });
    });
  </script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    (function () {
      if (window.innerWidth <= 768) return; // skip card animation on mobile
      var cards = gsap.utils.toArray('#hero-cards .playing-card');
      if (!cards.length) return;

      var W      = window.innerWidth;
      var H      = window.innerHeight;
      var CARD_W = 320;
      var GAP    = 16;
      var PAD    = 40;

      /* Fan rotations */
      var startRotations = [-35, -15, 5, 25];
      var finalRotations = [-3,   1, -1,  3];

      /* Natural flex left-edge for each card (justify-content:center, padding PAD) */
      var totalW     = 4 * CARD_W + 3 * GAP;
      var flexStart  = Math.max(PAD, (W - 2 * PAD - totalW) / 2 + PAD);
      var naturalX   = [0, 1, 2, 3].map(function (i) { return flexStart + i * (CARD_W + GAP); });

      /* Starting x: cluster all cards near right side (≈75% of viewport) */
      var clusterCenter = W * 0.76;
      var fanStep       = 18; /* small per-card spread so they overlap like a hand */
      var startX = [0, 1, 2, 3].map(function (i) {
        var targetCenter = clusterCenter + (i - 1.5) * fanStep;
        return targetCenter - (naturalX[i] + CARD_W / 2);
      });

      /* y: 360 → bottom 360px below viewport, only top 120px peeks above fold (480-360=120) */
      gsap.set(cards, {
        y:              360,
        rotation:       function (i) { return startRotations[i]; },
        x:              function (i) { return startX[i]; },
        transformOrigin: 'bottom center'
      });

      /* Scrubbed scroll timeline — cards rise + spread, hero content fades */
      var tl = gsap.timeline({
        scrollTrigger: {
          trigger: '#hero',
          start:   'top top',
          end:     'bottom top',
          scrub:   1.5
        }
      });

      tl.to('.hero-float', { opacity: 0, ease: 'none', duration: 3 }, 0);
      tl.to(cards, {
        y:        0,
        x:        0,
        rotation: function (i) { return finalRotations[i]; },
        ease:     'power2.out',
        stagger:  0.04,
        duration: 10
      }, 0);

      /* Hover lift — only active after cards have fully scrolled into place */
      var cardsReady = false;
      ScrollTrigger.create({
        trigger: '#hero',
        start: 'top top',
        end: 'bottom top',
        onLeave: function () { cardsReady = true; },
        onEnterBack: function () { cardsReady = false; }
      });

      cards.forEach(function (card, i) {
        var resting = finalRotations[i];
        card.addEventListener('mouseenter', function () {
          if (!cardsReady) return;
          gsap.to(card, { y: -25, scale: 1.08, duration: 0.35, ease: 'power2.out', overwrite: 'auto' });
        });
        card.addEventListener('mouseleave', function () {
          if (!cardsReady) return;
          gsap.to(card, { y: 0, scale: 1, duration: 0.7, ease: 'elastic.out(1.2,0.4)', overwrite: 'auto' });
        });
      });
    })();
  </script>
</body>
</html>
