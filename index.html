  <style>
    .reveal { opacity:0; transform:translateY(28px); transition: opacity .7s ease, transform .7s ease; }
    .playing-card .vid-controls { display: none; }
    .reveal.visible { opacity:1; transform:translateY(0); }

    /* ── Chromatic aberration RGB split ── */
    .hero-title { position: relative; display: block; }
    .hero-title span {
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      display: block;
    }
    .title-main {
      position: relative !important;
      color: white;
    }
    .title-r {
      color: rgba(255, 50, 100, 0.7);
      transform: translate(-3px, 0);
      mix-blend-mode: screen;
      transition: transform 0.15s ease;
    }
    .title-b {
      color: rgba(0, 220, 255, 0.7);
      transform: translate(3px, 0);
      mix-blend-mode: screen;
      transition: transform 0.15s ease;
    }
    .hero-title:hover .title-r { transform: translate(-10px, -2px); }
    .hero-title:hover .title-b { transform: translate(10px, 2px); }
  </style>
</head>
<body>

  <!-- SVG torn-edge filter for playing cards -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="torn-edge" x="-5%" y="-5%" width="110%" height="110%">
        <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" seed="2" result="noise"/>
        <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
      </filter>
    </defs>
  </svg>

  <script src="js/main.js"></script>
  <script>
  (function () {
    const titleEl = document.querySelector('.hero-title');

    if (window.innerWidth <= 768) {
      // Mobile: plain chromatic aberration spans, no PixiJS
      const t = titleEl.textContent.trim();
      titleEl.innerHTML = `
        <span class="title-r" aria-hidden="true">${t}</span>
        <span class="title-main">${t}</span>
        <span class="title-b" aria-hidden="true">${t}</span>
      `;
      titleEl.addEventListener('mousemove', e => {
        const r = titleEl.getBoundingClientRect();
        const x = (e.clientX - r.left) / r.width - 0.5;
        const y = (e.clientY - r.top) / r.height - 0.5;
        document.querySelector('.title-r').style.transform = `translate(${-x*30}px, ${-y*10}px)`;
        document.querySelector('.title-b').style.transform = `translate(${x*30}px, ${y*10}px)`;
      });
      titleEl.addEventListener('mouseleave', () => {
        document.querySelector('.title-r').style.transform = 'translate(-3px, 0)';
        document.querySelector('.title-b').style.transform = 'translate(3px, 0)';
      });
      return;
    }

    // Desktop: PixiJS fluted-glass displacement + RGB split
    document.fonts.ready.then(() => {
      const heroPin = document.querySelector('.hero-pin');
      const W = window.innerWidth;
      const H = window.innerHeight;
      const fontSize = parseFloat(window.getComputedStyle(titleEl).fontSize);

      let app;
      try {
        app = new PIXI.Application({
          width: W, height: H,
          backgroundAlpha: 0,
          antialias: true,
          resolution: window.devicePixelRatio || 1,
          autoDensity: true,
        });
      } catch (e) { return; } // WebGL unavailable — leave plain text

      // Hide HTML title; PixiJS renders it (with RGB split)
      titleEl.style.opacity = '0';
      titleEl.style.pointerEvents = 'auto'; // still catches mouse events

      const canvas = app.view;
      canvas.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:4;';
      heroPin.appendChild(canvas);

      const CX = W / 2, CY = H / 2;
      const baseStyle = { fontFamily: 'Jost, sans-serif', fontSize, fontWeight: '800', letterSpacing: -0.01 * fontSize };

      // Three text layers matching .title-r / .title-main / .title-b
      const tR    = new PIXI.Text('GABIJA SURA', new PIXI.TextStyle({ ...baseStyle, fill: 'rgba(255,50,100,0.7)' }));
      const tMain = new PIXI.Text('GABIJA SURA', new PIXI.TextStyle({ ...baseStyle, fill: '#ffffff' }));
      const tB    = new PIXI.Text('GABIJA SURA', new PIXI.TextStyle({ ...baseStyle, fill: 'rgba(0,220,255,0.7)' }));

      [tR, tMain, tB].forEach(t => { t.anchor.set(0.5); t.y = CY; });
      tR.x    = CX - 3;   // pink offset left
      tMain.x = CX;
      tB.x    = CX + 3;   // cyan offset right

      tR.blendMode = PIXI.BLEND_MODES.SCREEN;
      tB.blendMode = PIXI.BLEND_MODES.SCREEN;

      // ── Fluted-glass displacement texture: pure vertical sine stripes ──
      // R channel = x-displacement ridges, G channel = 128 (neutral / no y shift)
      const NS = 512;
      const nc = document.createElement('canvas');
      nc.width = nc.height = NS;
      const nctx = nc.getContext('2d');
      const id = nctx.createImageData(NS, NS);
      for (let i = 0; i < id.data.length; i += 4) {
        const px = (i / 4) % NS;
        id.data[i]   = Math.floor((Math.sin(px * 0.06) * 0.5 + 0.5) * 255); // R → x ridges
        id.data[i+1] = 128; // G → no vertical displacement
        id.data[i+2] = 128;
        id.data[i+3] = 255;
      }
      nctx.putImageData(id, 0, 0);

      const noiseTex   = PIXI.Texture.from(nc);
      const dispSprite = new PIXI.Sprite(noiseTex);
      dispSprite.texture.baseTexture.wrapMode = PIXI.WRAP_MODES.REPEAT;
      app.stage.addChild(dispSprite);

      const dispFilter = new PIXI.DisplacementFilter(dispSprite);
      dispFilter.scale.set(0); // off at rest

      // Group all text in a container — single filter on the whole group
      const group = new PIXI.Container();
      group.addChild(tR, tMain, tB);
      group.filters = [dispFilter];
      app.stage.addChild(group);

      // Tick: slow horizontal drift of flute pattern + apply tweened scale
      const state = { scale: 0 };
      app.ticker.add(delta => {
        dispSprite.x += 0.15 * delta; // gentle horizontal drift
        dispFilter.scale.set(state.scale);
      });

      // ── FIX 1: trigger ONLY when mouse is over the title element ──
      titleEl.addEventListener('mouseenter', () => {
        gsap.killTweensOf(state);
        gsap.to(state, { scale: 30, duration: 0.35, ease: 'power2.out' });
      });

      titleEl.addEventListener('mouseleave', () => {
        gsap.killTweensOf(state);
        gsap.to(state, { scale: 0, duration: 0.8, ease: 'power2.out' }); // smooth 0.8s recovery
      });
    });
  })();
  </script>
  <script>
    gsap.registerPlugin(ScrollTrigger);

    (function () {
      if (window.innerWidth <= 768) return; // skip card animation on mobile
      var cards = gsap.utils.toArray('#hero-cards .playing-card');
      if (!cards.length) return;

      var W      = window.innerWidth;
      var H      = window.innerHeight;
      var CARD_W = 320;
      var GAP    = 16;
      var PAD    = 40;

      /* Fan rotations */
      var startRotations = [-35, -15, 5, 25];
      var finalRotations = [-3,   1, -1,  3];

      /* Natural flex left-edge for each card (justify-content:center, padding PAD) */
      var totalW     = 4 * CARD_W + 3 * GAP;
      var flexStart  = Math.max(PAD, (W - 2 * PAD - totalW) / 2 + PAD);
      var naturalX   = [0, 1, 2, 3].map(function (i) { return flexStart + i * (CARD_W + GAP); });

      /* Starting x: cluster all cards near right side (≈75% of viewport) */
      var clusterCenter = W * 0.76;
      var fanStep       = 18; /* small per-card spread so they overlap like a hand */
      var startX = [0, 1, 2, 3].map(function (i) {
        var targetCenter = clusterCenter + (i - 1.5) * fanStep;
        return targetCenter - (naturalX[i] + CARD_W / 2);
      });

      /* y: 360 → bottom 360px below viewport, only top 120px peeks above fold (480-360=120) */
      gsap.set(cards, {
        y:              360,
        rotation:       function (i) { return startRotations[i]; },
        x:              function (i) { return startX[i]; },
        transformOrigin: 'bottom center'
      });

      /* Scrubbed scroll timeline — cards rise + spread, hero content fades */
      var tl = gsap.timeline({
        scrollTrigger: {
          trigger: '#hero',
          start:   'top top',
          end:     'bottom top',
          scrub:   1.5
        }
      });

      tl.to('.hero-float', { opacity: 0, ease: 'none', duration: 3 }, 0);
      tl.to(cards, {
        y:        0,
        x:        0,
        rotation: function (i) { return finalRotations[i]; },
        ease:     'power2.out',
        stagger:  0.04,
        duration: 10
      }, 0);

      /* Hover lift — only active after cards have fully scrolled into place */
      var cardsReady = false;
      ScrollTrigger.create({
        trigger: '#hero',
        start: 'top top',
        end: 'bottom top',
        onLeave: function () { cardsReady = true; },
        onEnterBack: function () { cardsReady = false; }
      });

      cards.forEach(function (card, i) {
        var resting = finalRotations[i];
        card.addEventListener('mouseenter', function () {
          if (!cardsReady) return;
          gsap.to(card, { y: -25, scale: 1.08, duration: 0.35, ease: 'power2.out', overwrite: 'auto' });
        });
        card.addEventListener('mouseleave', function () {
          if (!cardsReady) return;
          gsap.to(card, { y: 0, scale: 1, duration: 0.7, ease: 'elastic.out(1.2,0.4)', overwrite: 'auto' });
        });
      });
    })();
  </script>
</body>
