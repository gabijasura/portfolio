<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body, html { overflow: hidden; margin: 0; }

    .playground-wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      cursor: grab;
      position: relative;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(12, 260px);
      grid-template-rows: repeat(6, 260px);
      gap: 12px;
      padding: 12px;
      position: absolute;
      will-change: transform;
    }

    .video-item {
      width: 260px;
      height: 260px;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-item .vid-controls { display: none; }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="playground-wrapper">
    <div class="video-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const playgroundVideos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
    ];

    const grid = document.querySelector('.video-grid');
    const wrapper = document.querySelector('.playground-wrapper');

    // Fill all 72 cells (12x6) with videos, looping through the playlist
    const totalCells = 12 * 6;
    for (let i = 0; i < totalCells; i++) {
      const src = playgroundVideos[i % playgroundVideos.length];
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = src.endsWith('.gif')
        ? `<img src="videos/${src}" alt="">`
        : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
      grid.appendChild(item);
      const v = item.querySelector('video');
      if (v) { v.muted = true; v.play().catch(() => {}); }
    }

    // Start grid centered so you can pan in all directions
    const gridW = 12 * (260 + 12);
    const gridH = 6 * (260 + 12);
    let x = -(gridW - window.innerWidth) / 2;
    let y = -(gridH - window.innerHeight) / 2;
    gsap.set(grid, { x, y });

    // Drag with momentum
    let isDragging = false, startX, startY, velX = 0, velY = 0, lastX, lastY;

    const clamp = (val, min, max) => Math.min(max, Math.max(min, val));
    const minX = -(gridW - window.innerWidth + 12);
    const minY = -(gridH - window.innerHeight + 12);

    wrapper.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.clientX - x;
      startY = e.clientY - y;
      lastX = e.clientX;
      lastY = e.clientY;
      velX = 0;
      velY = 0;
      gsap.killTweensOf(grid);
      wrapper.style.cursor = 'grabbing';
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      velX = e.clientX - lastX;
      velY = e.clientY - lastY;
      lastX = e.clientX;
      lastY = e.clientY;
      x = clamp(e.clientX - startX, minX, 0);
      y = clamp(e.clientY - startY, minY, 0);
      gsap.set(grid, { x, y });
    });

    window.addEventListener('mouseup', () => {
      if (!isDragging) return;
      isDragging = false;
      wrapper.style.cursor = 'grab';
      x = clamp(x + velX * 6, minX, 0);
      y = clamp(y + velY * 6, minY, 0);
      gsap.to(grid, { x, y, duration: 1, ease: 'power3.out' });
    });
  </script>
</body>
</html>
