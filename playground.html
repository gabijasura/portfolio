<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body, html { overflow: hidden; }

    .playground-wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .video-grid {
      display: grid;
      grid-template-rows: repeat(3, 280px);
      grid-auto-flow: column;
      grid-auto-columns: 280px;
      gap: 12px;
      padding: 12px;
      width: max-content;
      height: 100vh;
      align-content: center;
      will-change: transform;
    }

    .video-item {
      width: 280px;
      height: 280px;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Suppress injected vid-controls */
    .video-item .vid-controls { display: none; }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="playground-wrapper">
    <div class="video-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const playgroundVideos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
    ];

    const grid = document.querySelector('.video-grid');

    // Fill grid with 4x items for seamless loop
    [...playgroundVideos, ...playgroundVideos, ...playgroundVideos, ...playgroundVideos].forEach(src => {
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = src.endsWith('.gif')
        ? `<img src="videos/${src}" alt="">`
        : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
      grid.appendChild(item);
    });

    // Wait one frame for DOM to paint so scrollWidth is accurate
    requestAnimationFrame(() => {
      const totalWidth = grid.scrollWidth / 4;

      // Auto-scroll
      const anim = gsap.to(grid, {
        x: -totalWidth,
        duration: 60,
        ease: 'none',
        repeat: -1,
        modifiers: {
          x: gsap.utils.unitize(x => parseFloat(x) % totalWidth)
        }
      });

      // Mouse wheel scrolls horizontally
      let wheelTimeout;
      let xPos = 0;

      window.addEventListener('wheel', e => {
        e.preventDefault();
        anim.pause();
        xPos += -e.deltaY * 1.5;
        gsap.to(grid, {
          x: xPos % totalWidth,
          duration: 0.8,
          ease: 'power2.out'
        });
        clearTimeout(wheelTimeout);
        wheelTimeout = setTimeout(() => anim.play(), 1500);
      }, { passive: false });

      // Pause auto-scroll on hover
      grid.addEventListener('mouseenter', () => anim.pause());
      grid.addEventListener('mouseleave', () => anim.play());
    });
  </script>
</body>
</html>
