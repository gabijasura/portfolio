<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { overflow-x: hidden; }

    .playground-header {
      padding: 120px 48px 32px;
    }

    .playground-wrapper {
      display: flex;
      flex-direction: column;
      gap: 24px;
      padding: 60px 0;
      overflow: hidden;
    }

    .video-row {
      display: flex;
      gap: 16px;
      width: max-content;
    }

    .video-item {
      width: 280px;
      height: 400px;
      border-radius: 12px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    /* Suppress injected vid-controls */
    .video-item .vid-controls { display: none; }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>
    <div class="playground-header">
      <h1 class="work-title work-page-title reveal">Playground</h1>
    </div>

    <div class="playground-wrapper">
      <div class="video-row row-1"></div>
      <div class="video-row row-2"></div>
      <div class="video-row row-3"></div>
    </div>
  </main>

  <footer>
    <span>Gabija Sura | <a href="mailto:gabijasura@gmail.com">gabijasura@gmail.com</a> | 2025</span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const videos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
    ];

    // Fill each row with 4x duplicated videos for truly seamless loop
    document.querySelectorAll('.video-row').forEach(row => {
      [...videos, ...videos, ...videos, ...videos].forEach(src => {
        const item = document.createElement('div');
        item.className = 'video-item';
        const isGif = src.endsWith('.gif');
        item.innerHTML = isGif
          ? `<img src="videos/${src}" alt="">`
          : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
        row.appendChild(item);
      });
    });

    // Infinite scroll — portrait tiles, alternating directions
    const anim1 = gsap.to('.row-1', { x: '-25%', duration: 40, ease: 'none', repeat: -1 });
    const anim2 = gsap.to('.row-2', { x: '25%',  duration: 55, ease: 'none', repeat: -1, startAt: { x: '-25%' } });
    const anim3 = gsap.to('.row-3', { x: '-25%', duration: 35, ease: 'none', repeat: -1 });

    // Pause on hover, resume on leave
    document.querySelectorAll('.video-row').forEach((row, i) => {
      const anims = [anim1, anim2, anim3];
      row.addEventListener('mouseenter', () => anims[i].pause());
      row.addEventListener('mouseleave', () => anims[i].play());
    });
  </script>
</body>
</html>
