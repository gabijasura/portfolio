<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body, html { overflow: hidden; margin: 0; }

    .playground-wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(12, 260px);
      grid-template-rows: repeat(6, 260px);
      gap: 12px;
      padding: 12px;
      position: absolute;
      will-change: transform;
    }

    .video-item {
      width: 260px;
      height: 260px;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-item .vid-controls { display: none; }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="playground-wrapper">
    <div class="video-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const playgroundVideos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
    ];

    const grid = document.querySelector('.video-grid');
    const wrapper = document.querySelector('.playground-wrapper');

    // Fill all 72 cells (12x6) with videos, looping through the playlist
    const totalCells = 12 * 6;
    for (let i = 0; i < totalCells; i++) {
      const src = playgroundVideos[i % playgroundVideos.length];
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = src.endsWith('.gif')
        ? `<img src="videos/${src}" alt="">`
        : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
      grid.appendChild(item);
      const v = item.querySelector('video');
      if (v) { v.muted = true; v.play().catch(() => {}); }
    }

    // Start grid centered
    let x = -(grid.scrollWidth - window.innerWidth) / 2;
    let y = -(grid.scrollHeight - window.innerHeight) / 2;
    gsap.set(grid, { x, y });

    const minX = -(grid.scrollWidth - window.innerWidth);
    const minY = -(grid.scrollHeight - window.innerHeight);
    const clamp = (val, min, max) => Math.min(max, Math.max(min, val));

    window.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const offsetX = (e.clientX - cx) / cx; // -1 to 1
      const offsetY = (e.clientY - cy) / cy; // -1 to 1

      const targetX = clamp(x + offsetX * 300, minX, 0);
      const targetY = clamp(y + offsetY * 300, minY, 0);

      gsap.to(grid, {
        x: targetX,
        y: targetY,
        duration: 2,
        ease: 'power2.out',
        onUpdate: () => {
          x = gsap.getProperty(grid, 'x');
          y = gsap.getProperty(grid, 'y');
        }
      });
    });
  </script>
</body>
</html>
