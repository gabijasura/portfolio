<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body { overflow-x: hidden; }

    .playground-header {
      padding: 120px 48px 32px;
    }

    .playground-wrapper {
      overflow: hidden;
      padding: 80px 0;
      cursor: grab;
    }

    .playground-wrapper:active {
      cursor: grabbing;
    }

    .video-row {
      display: flex;
      gap: 12px;
      width: max-content;
      will-change: transform;
    }

    .video-item {
      width: 220px;
      height: 320px;
      border-radius: 10px;
      overflow: hidden;
      flex-shrink: 0;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    /* Suppress injected vid-controls */
    .video-item .vid-controls { display: none; }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>
    <div class="playground-header">
      <h1 class="work-title work-page-title reveal">Playground</h1>
    </div>

    <div class="playground-wrapper">
      <div class="video-row"></div>
    </div>
  </main>

  <footer>
    <span>Gabija Sura | <a href="mailto:gabijasura@gmail.com">gabijasura@gmail.com</a> | 2025</span>
  </footer>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const videoFiles = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
    ];

    const row = document.querySelector('.video-row');

    // Fill row with items x3 for seamless loop
    [...videoFiles, ...videoFiles, ...videoFiles].forEach(src => {
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = src.endsWith('.gif')
        ? `<img src="videos/${src}" alt="">`
        : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
      row.appendChild(item);
    });

    // Auto-scroll — use modifiers to wrap position seamlessly
    const totalWidth = row.scrollWidth / 3;
    const anim = gsap.to(row, {
      x: -totalWidth,
      duration: 40,
      ease: 'none',
      repeat: -1,
      modifiers: {
        x: gsap.utils.unitize(x => parseFloat(x) % totalWidth)
      }
    });

    // Pause on hover, resume on leave
    row.addEventListener('mouseenter', () => anim.pause());
    row.addEventListener('mouseleave', () => { if (!isDragging) anim.play(); });

    // Drag to scroll
    let isDragging = false, startX, currentX;

    row.addEventListener('mousedown', e => {
      isDragging = true;
      startX = e.clientX;
      currentX = gsap.getProperty(row, 'x');
      anim.pause();
    });

    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      const dx = e.clientX - startX;
      gsap.set(row, { x: currentX + dx });
    });

    window.addEventListener('mouseup', () => {
      if (isDragging) {
        isDragging = false;
        anim.play();
      }
    });
  </script>
</body>
</html>
