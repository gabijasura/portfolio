<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body, html { margin: 0; }
    @media (min-width: 769px) {
      body, html { overflow: hidden; }
    }

    .playground-wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    @media (max-width: 768px) {
      body, html { overflow: auto !important; }
      .playground-wrapper {
        overflow: auto !important;
        height: auto !important;
      }
      .vignette { display: none; }
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(12, 277px);
      grid-template-rows: repeat(6, 277px);
      gap: 20px;
      padding: 40px;
      position: absolute;
      will-change: transform;
    }

    .video-item {
      width: 277px;
      height: 277px;
      border-radius: 10px;
      overflow: hidden;
      background: rgba(0,0,0,0.15);
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-item .vid-controls { display: none; }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(180, 140, 200, 0.5) 100%);
    }
  </style>
</head>
<body>

  <canvas class="cursor-canvas"></canvas>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="vignette"></div>

  <div class="playground-wrapper">
    <div class="video-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const playgroundVideos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
      'Bubbles-glassflower.mp4',
      'Chain.mp4',
      'Comp 1_1.mp4',
      'SNTQ-CONSUME-1920x1080.mp4',
      'SNTQ-VID-1440x1440.mp4',
      'glass-flower-main.mp4',
    ];

    const isMobile = window.innerWidth <= 768;

    if (isMobile) {
      // Inject CSS overrides immediately — before anything renders
      const style = document.createElement('style');
      style.textContent = `
        body, html { overflow: auto !important; height: auto !important; }
        .playground-wrapper {
          overflow: visible !important;
          height: auto !important;
          min-height: 100vh;
          position: relative !important;
        }
        .video-grid {
          position: relative !important;
          transform: none !important;
          display: grid !important;
          grid-template-columns: repeat(2, 1fr) !important;
          gap: 8px !important;
          padding: 8px !important;
          width: 100% !important;
          height: auto !important;
          top: auto !important;
          left: auto !important;
        }
        .video-item {
          width: 100% !important;
          height: auto !important;
          aspect-ratio: 1/1 !important;
          position: relative !important;
        }
        .vignette { display: none !important; }
      `;
      document.head.appendChild(style);

      // Populate grid — no GSAP, no ticker
      const grid = document.querySelector('.video-grid');
      playgroundVideos.forEach(src => {
        const item = document.createElement('div');
        item.className = 'video-item';
        if (src.endsWith('.gif')) {
          item.innerHTML = `<img src="videos/${src}" style="width:100%;height:100%;object-fit:cover;">`;
        } else {
          const v = document.createElement('video');
          v.src = `videos/${src}`;
          v.muted = true;
          v.loop = true;
          v.playsInline = true;
          v.setAttribute('playsinline', '');
          v.preload = 'metadata';
          v.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
          item.appendChild(v);
          item.addEventListener('click', () => v.paused ? v.play().catch(() => {}) : v.pause());
        }
        grid.appendChild(item);
      });

    } else {
      // Desktop: 12x6 shuffled grid with GSAP mouse parallax
      const grid = document.querySelector('.video-grid');

      function shuffle(arr) {
        const a = [...arr];
        for (let i = a.length - 1; i > 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
      }

      const totalCells = 12 * 6;
      const shuffledVideos = shuffle([...playgroundVideos]);
      for (let i = 0; i < totalCells; i++) {
        const src = shuffledVideos[i % shuffledVideos.length];
        const item = document.createElement('div');
        item.className = 'video-item';
        item.innerHTML = src.endsWith('.gif')
          ? `<img src="videos/${src}" alt="">`
          : `<video src="videos/${src}" muted loop playsinline></video>`;
        grid.appendChild(item);
        const v = item.querySelector('video');
        if (v) {
          v.muted = true;
          v.pause();
          item.addEventListener('mouseenter', () => v.play().catch(() => {}));
          item.addEventListener('mouseleave', () => v.pause());
        }
      }

      let mouseX = window.innerWidth / 2;
      let mouseY = window.innerHeight / 2;
      let currentX = -(grid.scrollWidth - window.innerWidth) / 2;
      let currentY = -(grid.scrollHeight - window.innerHeight) / 2;

      const minX = -(grid.scrollWidth - window.innerWidth);
      const minY = -(grid.scrollHeight - window.innerHeight);
      const clamp = (val, min, max) => Math.min(max, Math.max(min, val));

      gsap.set(grid, { x: currentX, y: currentY });

      window.addEventListener('mousemove', e => {
        mouseX = e.clientX;
        mouseY = e.clientY;
      });

      gsap.ticker.add(() => {
        const cx = window.innerWidth / 2;
        const cy = window.innerHeight / 2;
        const offsetX = (mouseX - cx) / cx;
        const offsetY = (mouseY - cy) / cy;

        const targetX = clamp(-(grid.scrollWidth - window.innerWidth) / 2 - offsetX * 150, minX, 0);
        const targetY = clamp(-(grid.scrollHeight - window.innerHeight) / 2 - offsetY * 150, minY, 0);

        currentX += (targetX - currentX) * 0.02;
        currentY += (targetY - currentY) * 0.02;

        gsap.set(grid, { x: currentX, y: currentY });
      });
    }
  </script>
</body>
</html>
