<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body, html { overflow: hidden; margin: 0; }

    .playground-wrapper {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(12, 260px);
      grid-template-rows: repeat(6, 260px);
      gap: 12px;
      padding: 12px;
      position: absolute;
      will-change: transform;
    }

    .video-item {
      width: 260px;
      height: 260px;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .video-item .vid-controls { display: none; }

    .vignette {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
      background:
        radial-gradient(ellipse at center, transparent 40%, rgba(180, 140, 200, 0.5) 100%);
    }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="vignette"></div>

  <div class="playground-wrapper">
    <div class="video-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const playgroundVideos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
      'Bubbles-glassflower.mp4',
      'Chain.mp4',
      'Comp 1_1.mp4',
      'SNTQ-CONSUME-1920x1080.mp4',
      'SNTQ-VID-1440x1440.mp4',
      'glass-flower-main.mp4',
    ];

    const grid = document.querySelector('.video-grid');
    const wrapper = document.querySelector('.playground-wrapper');

    function interleaveRepeat(arr, times) {
      const result = [];
      for (let i = 0; i < arr.length * times; i++) {
        result.push(arr[i % arr.length]);
      }
      for (let i = result.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [result[i], result[j]] = [result[j], result[i]];
      }
      return result;
    }

    interleaveRepeat(playgroundVideos, 9).slice(0, 72).forEach(src => {
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = src.endsWith('.gif')
        ? `<img src="videos/${src}" alt="">`
        : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
      grid.appendChild(item);
      const v = item.querySelector('video');
      if (v) { v.muted = true; v.play().catch(() => {}); }
    });

    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = -(grid.scrollWidth - window.innerWidth) / 2;
    let currentY = -(grid.scrollHeight - window.innerHeight) / 2;

    const minX = -(grid.scrollWidth - window.innerWidth);
    const minY = -(grid.scrollHeight - window.innerHeight);
    const clamp = (val, min, max) => Math.min(max, Math.max(min, val));

    gsap.set(grid, { x: currentX, y: currentY });

    window.addEventListener('mousemove', e => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    gsap.ticker.add(() => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const offsetX = (mouseX - cx) / cx;
      const offsetY = (mouseY - cy) / cy;

      const targetX = clamp(-(grid.scrollWidth - window.innerWidth) / 2 + offsetX * 400, minX, 0);
      const targetY = clamp(-(grid.scrollHeight - window.innerHeight) / 2 + offsetY * 400, minY, 0);

      currentX += (targetX - currentX) * 0.04;
      currentY += (targetY - currentY) * 0.04;

      gsap.set(grid, { x: currentX, y: currentY });
    });
  </script>
</body>
</html>
