<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    body, html { overflow: hidden; }

    .playground-wrapper {
      position: fixed;
      inset: 0;
      overflow: hidden;
    }

    .video-grid {
      display: grid;
      grid-template-columns: repeat(20, 280px);
      gap: 12px;
      padding: 12px;
      width: max-content;
      position: absolute;
      top: 0;
      left: 0;
      will-change: transform;
    }

    .video-item {
      width: 280px;
      height: 280px;
      border-radius: 10px;
      overflow: hidden;
    }

    .video-item video,
    .video-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }

    .video-item .vid-controls { display: none; }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="playground.html">Playground</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <div class="playground-wrapper">
    <div class="video-grid"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="js/main.js"></script>
  <script>
    const playgroundVideos = [
      'Daisy.mp4',
      'Flower_comp.mp4',
      'Glitchy_comp.mp4',
      'Paint_demon.mp4',
      'Star_blobtrack.mp4',
      'CRT_SFX.mp4',
      'JoinUs.mp4',
      'SyntetiQ.mp4',
    ];

    const COLS = 20;
    const ROWS = 14;
    const CELL = 280 + 12; // tile + gap
    const totalW = COLS * CELL;
    const totalH = ROWS * CELL;

    const grid = document.querySelector('.video-grid');

    // Generate enough items to fill COLS × ROWS grid
    const totalCells = COLS * ROWS;
    const items = [];
    while (items.length < totalCells) {
      items.push(...playgroundVideos);
    }
    items.slice(0, totalCells).forEach(src => {
      const item = document.createElement('div');
      item.className = 'video-item';
      item.innerHTML = src.endsWith('.gif')
        ? `<img src="videos/${src}" alt="">`
        : `<video src="videos/${src}" autoplay muted loop playsinline></video>`;
      grid.appendChild(item);
    });

    // Start at center of grid so there's room to drift in all directions
    let xPos = totalW / 2;
    let yPos = totalH / 2;
    let driftX = 0;
    let driftY = 0;

    window.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      driftX = ((e.clientX - cx) / cx) * 3;
      driftY = ((e.clientY - cy) / cy) * 3;
    });

    gsap.ticker.add(() => {
      xPos += driftX || 0.8;
      yPos += driftY || 0.3;

      // Wrap seamlessly
      xPos = ((xPos % totalW) + totalW) % totalW;
      yPos = ((yPos % totalH) + totalH) % totalH;

      gsap.set(grid, { x: -xPos, y: -yPos });
    });
  </script>
</body>
</html>
