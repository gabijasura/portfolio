<!DOCTYPE html>

  <title>Playground — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .playground-header {
      padding: 120px 24px 24px;
    }

    .playground-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 24px;
    }

    .playground-item {
      position: relative;
      aspect-ratio: 16/9;
      overflow: hidden;
      border-radius: 8px;
      cursor: none;
    }

    .playground-item video,
    .playground-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .playground-item .item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.5) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .playground-item:hover .item-overlay {
      opacity: 1;
    }

    .playground-item .item-title {
      position: absolute;
      bottom: 14px;
      left: 16px;
      color: #fff;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      font-family: 'Jost', sans-serif;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .playground-item:hover .item-title {
      opacity: 1;
    }

    /* Suppress injected vid-controls */
    .playground-item .vid-controls { display: none; }
  </style>
</head>
