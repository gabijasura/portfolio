<body>

  <div class="cursor"></div>

  <nav>

  <main class="work-section work-page-section">
    <h1 class="work-title work-page-title reveal">Work</h1>

    <div class="work-feed">

      <!-- Row 1: Yennenga (left) + frog deco (right) -->
      <div class="work-pair reveal">
        <div>
          <a href="yennenga.html" class="work-thumb">
            <video src="videos/Yennenga_16x9.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
          </a>
          <p class="work-label">Yennenga</p>
        </div>
        <div class="work-cell-deco">
          <img src="assets/frog.gif" alt="" class="work-deco-img" />
        </div>
      </div>

      <!-- Row 2: cat deco (left) + Passion (right) -->
      <div class="work-pair reveal">
        <div class="work-cell-deco">
          <img src="assets/fenyx.gif" alt="" class="work-deco-img" style="width:clamp(100px,14vw,180px);" />
        </div>
        <div>
          <a href="passion.html" class="work-thumb">
            <video src="videos/Passion.mp4" muted loop playsinline preload="metadata" data-start="8"></video>
          </a>
          <p class="work-label">Passion</p>
        </div>
      </div>

      <!-- Row 3: The Frog (left) + Mushroom Festival (right) -->
      <div class="work-pair reveal">
        <div>
          <a href="frog.html" class="work-thumb">
            <video src="videos/Frog.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
          </a>
          <p class="work-label">The Frog</p>
        </div>
        <div>
          <a href="mushroom.html" class="work-thumb">
            <video src="videos/Mushroom.mp4" muted loop playsinline preload="metadata" data-start="3"></video>
          </a>
          <p class="work-label">Mushroom Festival</p>
        </div>
      </div>

      <!-- Row 4: Coral (left) + [duck + Pass the Ball] (right) -->
      <div class="work-pair reveal">
        <div>
          <a href="coral.html" class="work-thumb">
            <img src="videos/Coral.gif" alt="Coral" />
          </a>
          <p class="work-label">Coral</p>
        </div>
        <div class="work-cell-stacked">
          <img src="assets/duck.gif" alt="" class="work-deco-img" />
          <a href="ball.html" class="work-thumb">
            <video src="videos/TheBall.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
          </a>
          <p class="work-label">Pass the Ball</p>
        </div>
      </div>

      <!-- Row 5: Nightfall (left) + [duck deco + Fenyx] (right) -->
      <div class="work-pair reveal">
        <div>
          <a href="nightfall.html" class="work-thumb">
            <video src="videos/Nightfall.mp4" muted loop playsinline preload="metadata" data-start="38"></video>
          </a>
          <p class="work-label">Nightfall</p>
        </div>
        <div class="work-cell-stacked">
          <img src="assets/yarn.gif" alt="" class="work-deco-img" />
          <a href="fenyx.html" class="work-thumb">
            <video src="videos/FENYX 1920x1080_SUBTITLES.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
          </a>
          <p class="work-label">Fenyx</p>
        </div>
      </div>

      <!-- Row 6: Duck (left) + 8ball deco (right) -->
      <div class="work-pair reveal">
        <div>
          <a href="duck.html" class="work-thumb">
            <img src="assets/duck.gif" alt="Duck" style="aspect-ratio:4/3;object-fit:contain;background:rgba(255,255,255,0.1);" />
          </a>
          <p class="work-label">The Duck</p>
        </div>
        <div class="work-cell-deco">
          <img src="assets/8ball.png" alt="" class="work-deco-img" style="width:clamp(60px,8vw,110px);" />
        </div>
