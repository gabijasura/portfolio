<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Work — Gabija Sura</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .work-header {
      padding: 120px 60px 48px;
    }

    .projects-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    .project {
      position: relative;
      width: 100%;
      aspect-ratio: 4/5;
      overflow: hidden;
      cursor: none;
    }

    .project a {
      display: block;
      width: 100%;
      height: 100%;
    }

    .project video,
    .project img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s ease;
    }

    .project:hover video,
    .project:hover img {
      transform: scale(1.04);
    }

    .project-overlay {
      position: absolute;
      inset: 0;
      opacity: 0;
      display: flex;
      align-items: flex-end;
      padding: 40px;
      background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 60%);
      transition: opacity 0.4s ease;
      pointer-events: none;
    }

    .project:hover .project-overlay {
      opacity: 1;
    }

    .project-title {
      color: #fff;
      font-size: 1.8vw;
      font-weight: 800;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      font-family: 'Jost', sans-serif;
    }
  </style>
</head>
<body>

  <div class="cursor"></div>

  <nav>
    <a href="index.html" class="nav-logo">Gabija Sura</a>
    <ul class="nav-links">
      <li><a href="work.html">Work</a></li>
      <li><a href="about.html">About</a></li>
    </ul>
  </nav>

  <main>
    <div class="work-header">
      <h1 class="work-title work-page-title reveal">Work</h1>
    </div>

    <div class="projects-grid">

      <div class="project">
        <a href="yennenga.html">
          <video src="videos/Yennenga_16x9.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
        </a>
        <div class="project-overlay">
          <p class="project-title">Yennenga</p>
        </div>
      </div>

      <div class="project">
        <a href="frog.html">
          <video src="videos/Frog.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
        </a>
        <div class="project-overlay">
          <p class="project-title">The Frog</p>
        </div>
      </div>

      <div class="project">
        <a href="mushroom.html">
          <video src="videos/Mushroom.mp4" muted loop playsinline preload="metadata" data-start="3"></video>
        </a>
        <div class="project-overlay">
          <p class="project-title">Mushroom Festival</p>
        </div>
      </div>

      <div class="project">
        <a href="nightfall.html">
          <video src="videos/Nightfall.mp4" muted loop playsinline preload="metadata" data-start="38"></video>
        </a>
        <div class="project-overlay">
          <p class="project-title">Nightfall</p>
        </div>
      </div>

      <div class="project">
        <a href="fenyx.html">
          <video src="videos/FENYX 1920x1080_SUBTITLES.mp4" muted loop playsinline preload="metadata" data-start="0"></video>
        </a>
        <div class="project-overlay">
          <p class="project-title">Fenyx</p>
        </div>
      </div>

      <div class="project">
        <a href="passion.html">
          <video src="videos/Passion.mp4" muted loop playsinline preload="metadata" data-start="8"></video>
        </a>
        <div class="project-overlay">
          <p class="project-title">Passion</p>
        </div>
      </div>

    </div>
  </main>

  <footer>
    <span>Gabija Sura | <a href="mailto:gabijasura@gmail.com">gabijasura@gmail.com</a> | 2025</span>
  </footer>

  <script src="js/main.js"></script>
  <script>
    // Hover-to-play with data-start offsets
    document.querySelectorAll('.project').forEach(project => {
      const video = project.querySelector('video');
      if (!video) return;
      const startTime = parseFloat(video.dataset.start) || 0;
      const seekToStart = () => { video.currentTime = startTime; };
      if (video.readyState >= 1) { seekToStart(); }
      else { video.addEventListener('loadedmetadata', seekToStart, { once: true }); }
      project.addEventListener('mouseenter', () => {
        video.currentTime = startTime;
        video.play().catch(() => {});
      });
      project.addEventListener('mouseleave', () => {
        video.pause();
        video.currentTime = startTime;
      });
    });
  </script>
</body>
</html>
